<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>정밀 생산성 분석 리포트 v10.1</title>
    <style>
        :root { --primary: #24292f; --bg: #f6f8fa; --border: #d0d7de; --accent: #2da44e; --blue: #0969da; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); margin: 0; color: #1f2328; font-size: 13px; height: 100vh; overflow: hidden; }
        .wrapper { display: flex; flex-direction: column; height: 100vh; }
        .header-bar { background: var(--primary); color: white; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
        .token-setup-bar { background: #fffbdd; color: #735c0f; padding: 10px 20px; border-bottom: 1px solid #d4a017; display: flex; align-items: center; gap: 12px; font-size: 12px; }
        .token-input { padding: 6px 10px; border: 1px solid #d4a017; border-radius: 4px; width: 350px; font-family: monospace; }
        .main-content { display: grid; grid-template-columns: 550px 1fr; gap: 0; flex-grow: 1; overflow: hidden; }
        .column { height: 100%; overflow-y: auto; padding: 25px; box-sizing: border-box; border-right: 1px solid var(--border); }
        .column-right { background: white; }
        .card { background: white; padding: 20px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 20px; }
        .process-box { border: 1px solid var(--border); border-radius: 10px; margin-bottom: 15px; background: #fff; border-left: 8px solid var(--blue); overflow: hidden; }
        .proc-header { padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .proc-body { padding: 15px; display: none; background: #fdfdfd; border-top: 1px solid #eee; }
        .proc-body.active { display: block; }
        .proc-name-input { font-weight: bold; border: 1px solid #cbd5e1; padding: 6px; border-radius: 4px; width: 180px; }
        .proc-ratio, .proc-time { width: 50px; border: 1px solid #cbd5e1; border-radius: 4px; text-align: center; font-weight: bold; }
        .factory-filter-area { margin-bottom: 20px; padding: 15px; background: #eff6ff; border-radius: 8px; border: 1px solid #bfdbfe; display: flex; align-items: center; gap: 15px; position: sticky; top: 0; }
        table { width: 100%; border-collapse: collapse; font-size: 12px; }
        th, td { border: 1px solid var(--border); padding: 10px 6px; text-align: center; }
        th { background: #f6f8fa; position: sticky; top: 0; }
        .col-total { background: #fff8c5; font-weight: bold; }
        .manpower-bold { font-weight: 900; font-size: 13px; }
        .sub-qty { font-size: 10px; color: #64748b; display: block; }
        .btn { border: none; padding: 8px 12px; border-radius: 6px; cursor: pointer; font-weight: 600; }
        .btn-blue { background: var(--blue); color: white; }
        .btn-green { background: var(--accent); color: white; }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="header-bar">
        <div><strong>🚀 팩토리 생산성 시뮬레이터 v10.1</strong> <span id="dbStatus">연결 대기...</span></div>
        <div><span id="syncStatus" style="margin-right:15px;">GitHub 상태 대기</span><button class="btn btn-green" onclick="saveToGitHub()">💾 설정 저장</button></div>
    </div>

    <div class="token-setup-bar">
        🔑 <strong>GitHub Token:</strong> 
        <input type="password" id="ghTokenInput" class="token-input" placeholder="ghp_... 토큰 입력">
        <button class="btn btn-blue" onclick="applyToken()">연결 및 데이터 로드</button>
    </div>

    <div class="main-content">
        <div class="column">
            <h2>🛠️ 공정 및 대상 설정</h2>
            <div id="processList"></div>
            <button class="btn btn-blue" style="width:100%; padding:12px;" onclick="addNewProcess()">+ 새로운 공정 추가</button>
        </div>
        <div class="column column-right">
            <h2>📊 월별 투입인원 분석</h2>
            <div class="factory-filter-area">
                <select id="factorySelector" style="padding:8px; border-radius:6px; border:2px solid var(--blue);" onchange="runCalculation()">
                    <option value="Total">전체 합계 (Total)</option>
                </select>
            </div>
            <table id="resultTable">
                <thead id="tableHead"></thead>
                <tbody id="resultBody"><tr><td colspan="10" style="padding:100px;">토큰을 입력하고 연결 버튼을 눌러주세요.</td></tr></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    let GITHUB_TOKEN = localStorage.getItem('gh_productivity_token') || "";
    const REPO_OWNER = "AlexKim0526";
    const REPO_NAME = "process-data";
    // API 경로를 통한 호출로 변경 (Private 대응)
    const MASTER_DB_API = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/masterdb.csv`;
    const DATA_FILE = "data.json";

    const MONTH_DISPLAY = ["", "2025-01", "2025-02", "2025-03", "2025-04", "2025-05", "2025-06", "2025-07", "2025-08", "2025-09", "2025-10", "2025-11", "2025-12"];

    let masterData = { hierarchy: {}, factories: { "Total": { cat_monthly: {}, item_monthly: {} } }, months: [] };
    let currentSha = "";

    if(GITHUB_TOKEN) {
        document.getElementById('ghTokenInput').value = GITHUB_TOKEN;
        window.onload = loadMasterDB;
    }

    function applyToken() {
        GITHUB_TOKEN = document.getElementById('ghTokenInput').value.trim();
        localStorage.setItem('gh_productivity_token', GITHUB_TOKEN);
        loadMasterDB();
    }

    // [핵심] 토큰을 사용하여 DB 파일 가져오기
    async function loadMasterDB() {
        const dbStatus = document.getElementById('dbStatus');
        if(!GITHUB_TOKEN) { dbStatus.innerText = "🔑 토큰을 먼저 입력하세요."; return; }

        try {
            dbStatus.innerText = "⏳ 연결 중...";
            const res = await fetch(MASTER_DB_API, {
                headers: { "Authorization": `token ${GITHUB_TOKEN}`, "Accept": "application/vnd.github.v3.raw" }
            });
            if(!res.ok) throw new Error();
            const text = await res.text();
            parseCSV(text);
            dbStatus.innerText = "✅ 연결 완료";
            await loadConfig();
        } catch (e) {
            dbStatus.innerText = "❌ DB 로드 실패 (토큰/파일 확인)";
        }
    }

    function parseCSV(csv) {
        const lines = csv.split(/\r?\n/);
        const regex = /,(?=(?:(?:[^"]*"){2})*[^"]*$)/;
        const tempMonths = new Set();
        const foundFactories = new Set();
        lines.slice(1).forEach(line => {
            if (!line.trim()) return;
            const cols = line.split(regex).map(c => c.replace(/^"|"$/g, '').trim());
            const monthStr = cols[1], cat = cols[2], item = cols[3], fName = cols[4], qty = parseFloat(cols[5]) || 0;
            if (monthStr && cat && item) {
                tempMonths.add(monthStr); foundFactories.add(fName);
                if (!masterData.hierarchy[cat]) masterData.hierarchy[cat] = new Set();
                masterData.hierarchy[cat].add(item);
                if (!masterData.factories[fName]) masterData.factories[fName] = { cat_monthly: {}, item_monthly: {} };
                const update = (target) => {
                    const f = masterData.factories[target];
                    if (!f.cat_monthly[monthStr]) f.cat_monthly[monthStr] = {};
                    f.cat_monthly[monthStr][cat] = (f.cat_monthly[monthStr][cat] || 0) + qty;
                    if (!f.item_monthly[monthStr]) f.item_monthly[monthStr] = {};
                    f.item_monthly[monthStr][item] = (f.item_monthly[monthStr][item] || 0) + qty;
                };
                update("Total"); update(fName);
            }
        });
        masterData.months = Array.from(tempMonths).sort();
        const sel = document.getElementById('factorySelector');
        sel.innerHTML = '<option value="Total">전체 합계 (Total)</option>';
        Array.from(foundFactories).sort().forEach(f => {
            sel.innerHTML += `<option value="${f}">${f}</option>`;
        });
        for (let c in masterData.hierarchy) masterData.hierarchy[c] = Array.from(masterData.hierarchy[c]).sort();
    }

    function utf8_to_b64(str) { return btoa(encodeURIComponent(str).replace(/%([0-9A-F]{2})/g, (m, p1) => String.fromCharCode('0x' + p1))); }
    function b64_to_utf8(str) { return decodeURIComponent(atob(str).split('').map(c => '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)).join('')); }

    async function loadConfig() {
        try {
            const res = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${DATA_FILE}`, { 
                headers: { "Authorization": `token ${GITHUB_TOKEN}` } 
            });
            if (res.ok) {
                const data = await res.json();
                currentSha = data.sha;
                const config = JSON.parse(b64_to_utf8(data.content));
                document.getElementById('processList').innerHTML = ''; 
                config.forEach(c => addNewProcess(c.name, c.ratio, c.workTime, c.targets));
                runCalculation();
            } else { addNewProcess(); }
        } catch (e) { addNewProcess(); }
    }

    async function saveToGitHub() {
        const syncStatus = document.getElementById('syncStatus');
        const config = Array.from(document.querySelectorAll('.process-box')).map(box => ({
            name: box.querySelector('.proc-name-input').value,
            ratio: box.querySelector('.proc-ratio').value,
            workTime: box.querySelector('.proc-time').value,
            targets: Array.from(box.querySelectorAll('.target-row')).map(r => ({ name: r.dataset.name, type: r.dataset.type }))
        }));
        try {
            syncStatus.innerText = "⏳ 저장...";
            const shaRes = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${DATA_FILE}`, { headers: { "Authorization": `token ${GITHUB_TOKEN}` } });
            if(shaRes.ok) { const d = await shaRes.json(); currentSha = d.sha; }
            const res = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${DATA_FILE}`, {
                method: "PUT", headers: { "Authorization": `token ${GITHUB_TOKEN}`, "Content-Type": "application/json" },
                body: JSON.stringify({ message: "Update v10.1", content: utf8_to_b64(JSON.stringify(config)), sha: currentSha })
            });
            if (res.ok) { const r = await res.json(); currentSha = r.content.sha; syncStatus.innerText = "✅ 저장됨"; }
        } catch (e) { syncStatus.innerText = "❌ 실패"; }
    }

    function addNewProcess(name = "", ratio = 100, workTime = 60, targets = []) {
        const container = document.getElementById('processList');
        const div = document.createElement('div');
        div.className = 'process-box';
        let catOpts = `<option value="">-- 대분류 선택 --</option>`;
        Object.keys(masterData.hierarchy).sort().forEach(cat => { catOpts += `<option value="${cat}">${cat}</option>`; });
        div.innerHTML = `
            <div class="proc-header" onclick="this.nextElementSibling.classList.toggle('active')">
                <div class="proc-main-info" onclick="event.stopPropagation()">
                    <input type="text" class="proc-name-input" value="${name || '신규 공정'}">
                    <span style="font-size:11px;">물량비중: <input type="number" class="proc-ratio" value="${ratio}">%</span>
                    <span style="font-size:11px;">단위시간: <input type="number" class="proc-time" value="${workTime}">초</span>
                </div>
                <span>▼</span>
            </div>
            <div class="proc-body">
                <select class="cat-sel" style="width:100%; padding:5px;">${catOpts}</select>
                <div style="margin-top:10px; display:flex; gap:5px;">
                    <button class="btn btn-blue" style="flex:1;" onclick="addTarget(this, 'cat')">대분류 전체</button>
                    <button class="btn btn-blue" style="flex:1; background:#64748b;" onclick="toggleItemScroll(this)">품목 개별</button>
                </div>
                <div class="item-scroll" style="display:none; max-height:150px; overflow-y:auto; border:1px solid #ddd; margin-top:5px;"></div>
                <div class="target-list" style="margin-top:10px;"></div>
                <button class="btn" style="width:100%; color:red; margin-top:10px;" onclick="this.closest('.process-box').remove()">공정 삭제</button>
            </div>`;
        container.appendChild(div);
        if (targets.length > 0) targets.forEach(t => createTargetRow(div.querySelector('.target-list'), t.name, t.type));
    }

    function toggleItemScroll(btn) {
        const box = btn.closest('.process-box'), cat = box.querySelector('.cat-sel').value, scroll = box.querySelector('.item-scroll');
        if(!cat) return;
        scroll.innerHTML = '';
        masterData.hierarchy[cat].forEach(i => { scroll.innerHTML += `<label style="display:block;"><input type="checkbox" value="${i}"> ${i}</label>`; });
        scroll.style.display = 'block';
        const addBtn = document.createElement('button');
        addBtn.innerText = "선택 추가"; addBtn.className = "btn btn-green"; addBtn.style.width = "100%";
        addBtn.onclick = () => addTarget(btn, 'item');
        scroll.appendChild(addBtn);
    }

    function addTarget(btn, type) {
        const box = btn.closest('.process-box'), list = box.querySelector('.target-list'), cat = box.querySelector('.cat-sel').value;
        if (type === 'cat' && cat) createTargetRow(list, cat, 'cat');
        else box.querySelectorAll('.item-scroll input:checked').forEach(cb => createTargetRow(list, cb.value, 'item'));
        runCalculation();
    }

    function createTargetRow(container, name, type) {
        if ([...container.querySelectorAll('.target-row')].some(r => r.dataset.name === name)) return;
        const div = document.createElement('div');
        div.className = 'target-row'; div.dataset.name = name; div.dataset.type = type;
        div.style = "display:flex; justify-content:space-between; background:#eee; padding:5px; margin-bottom:2px; border-radius:4px;";
        div.innerHTML = `<span style="color:${type==='cat'?'green':'blue'}">${name}</span><button onclick="this.parentElement.remove(); runCalculation();">×</button>`;
        container.appendChild(div);
    }

    function runCalculation() {
        const d = 22, h = 8, avail = d * h * 3600;
        const fKey = document.getElementById('factorySelector').value, src = masterData.factories[fKey];
        if(!src) return;
        const procs = Array.from(document.querySelectorAll('.process-box')).map(box => ({
            name: box.querySelector('.proc-name-input').value, ratio: (parseFloat(box.querySelector('.proc-ratio').value) || 0) / 100,
            workTime: parseFloat(box.querySelector('.proc-time').value) || 0, targets: Array.from(box.querySelectorAll('.target-row')).map(r => ({ name: r.dataset.name, type: r.dataset.type }))
        }));
        let hHtml = `<tr><th>작업월</th><th>월 총물량</th><th>일평균</th>`;
        procs.forEach(p => hHtml += `<th>${p.name}</th>`);
        document.getElementById('tableHead').innerHTML = hHtml + `<th class="col-total">총 인원</th></tr>`;
        let bHtml = '';
        masterData.months.forEach(m => {
            let mQty = 0; const cats = src.cat_monthly[m] || {};
            for(let c in cats) mQty += cats[c];
            bHtml += `<tr><td>${m}</td><td>${Math.round(mQty).toLocaleString()}</td><td>${Math.round(mQty/d).toLocaleString()}</td>`;
            let tMan = 0;
            procs.forEach(p => {
                let pQ = 0; p.targets.forEach(t => pQ += (t.type === 'cat' ? (cats[t.name] || 0) : (src.item_monthly[m][t.name] || 0)));
                const man = (pQ * p.ratio * p.workTime) / avail;
                bHtml += `<td><span class="manpower-bold">${man.toFixed(1)}명</span><br><span class="sub-qty">(${Math.round(pQ*p.ratio/d).toLocaleString()}건/일)</span></td>`;
                tMan += man;
            });
            bHtml += `<td class="col-total">${tMan.toFixed(1)}명</td></tr>`;
        });
        document.getElementById('resultBody').innerHTML = bHtml;
    }

    window.onload = () => { if(GITHUB_TOKEN) loadMasterDB(); };
</script>
</body>
</html>
